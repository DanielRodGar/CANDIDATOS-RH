<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Selección de Sucursal — PYLSA ACERO</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Arial, sans-serif;
    background: #f5f7fa;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: #fff;
    border-radius: 12px;
    border: 1px solid #DDE3EA;
    width: 100%;
    max-width: 480px;
    overflow: hidden;
  }
  .header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid #DDE3EA;
    background: #1A3FA3;
  }
  .header-eyebrow {
    font-size: 11px;
    color: #a8c4f5;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .header-title {
    font-size: 20px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 2px;
  }
  .header-sub {
    font-size: 13px;
    color: #a8c4f5;
  }
  .body {
    padding: 20px 24px;
  }
  .info-box {
    background: #F0F4F8;
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 20px;
    font-size: 13px;
    color: #1C2B3A;
  }
  .info-box strong {
    color: #185FA5;
  }
  .label {
    font-size: 11px;
    font-weight: 700;
    color: #6B7E8F;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 10px;
  }
  .sucursal-grid {
    display: grid;
    gap: 8px;
    margin-bottom: 20px;
  }
  .btn-sucursal {
    display: block;
    width: 100%;
    padding: 13px 16px;
    border: 1.5px solid #DDE3EA;
    border-radius: 8px;
    background: #fff;
    color: #1C2B3A;
    font-size: 14px;
    font-weight: 600;
    text-align: left;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }
  .btn-sucursal:hover {
    border-color: #185FA5;
    background: #F0F6FF;
    color: #185FA5;
  }
  .btn-sucursal.selected {
    border-color: #185FA5;
    background: #E6F1FB;
    color: #185FA5;
  }
  .btn-sucursal::before {
    content: '○  ';
    color: #DDE3EA;
  }
  .btn-sucursal.selected::before {
    content: '●  ';
    color: #185FA5;
  }
  .divider {
    border: none;
    border-top: 1px solid #DDE3EA;
    margin: 16px 0;
  }
  .btn-confirm {
    display: block;
    width: 100%;
    padding: 13px;
    border-radius: 8px;
    background: #2DB84B;
    color: #fff;
    font-size: 15px;
    font-weight: 700;
    text-align: center;
    border: none;
    cursor: pointer;
    margin-bottom: 10px;
    opacity: 0.4;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .btn-confirm.active {
    opacity: 1;
    pointer-events: all;
  }
  .btn-novacante {
    display: block;
    width: 100%;
    padding: 13px;
    border-radius: 8px;
    background: transparent;
    color: #E8400C;
    font-size: 14px;
    font-weight: 700;
    text-align: center;
    border: 1.5px solid #E8400C;
    cursor: pointer;
    text-decoration: none;
  }
  .footer {
    text-align: center;
    font-size: 11px;
    color: #6B7E8F;
    padding: 14px 24px;
    border-top: 1px solid #DDE3EA;
  }
  .estado-ok {
    display: none;
    flex-direction: column;
    align-items: center;
    padding: 40px 24px;
    text-align: center;
  }
  .estado-ok .icon { font-size: 48px; margin-bottom: 16px; }
  .estado-ok h2 { font-size: 18px; font-weight: 700; color: #1C2B3A; margin-bottom: 8px; }
  .estado-ok p { font-size: 14px; color: #6B7E8F; }
  .error-msg {
    display: none;
    background: #FEF2EE;
    border: 1px solid #E8400C;
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 13px;
    color: #E8400C;
    margin-bottom: 16px;
    text-align: center;
  }
</style>
</head>
<body>
<div class="card">
 
  <div class="header">
    <div class="header-eyebrow">PYLSA ACERO · Reclutamiento</div>
    <div class="header-title" id="titulo">Seleccionar sucursal</div>
    <div class="header-sub" id="subtitulo">Cargando información...</div>
  </div>
 
  <div id="contenido-principal">
    <div class="body">
      <div class="info-box" id="info-candidato">Cargando...</div>
 
      <div class="label">¿En qué sucursal hay vacante?</div>
      <div class="sucursal-grid" id="lista-sucursales"></div>
 
      <div class="error-msg" id="error-msg">Por favor selecciona una sucursal antes de confirmar.</div>
 
      <button class="btn-confirm" id="btn-confirm" onclick="confirmar()">✓ Confirmar vacante</button>
      <a id="btn-no" class="btn-novacante" href="#">✗ No hay vacante</a>
    </div>
    <div class="footer">PYLSA ACERO · Sistema de Reclutamiento</div>
  </div>
 
  <div class="estado-ok" id="estado-ok">
    <div class="icon">✅</div>
    <h2 id="ok-titulo">Vacante confirmada</h2>
    <p id="ok-subtitulo">El proceso de selección ha iniciado.</p>
  </div>
 
</div>
 
<script>
const WEBHOOK = 'https://danielrodriguez.app.n8n.cloud/webhook/candidatos-respuesta-regional';
 
const SUCURSALES_POR_MUNICIPIO = {
  'Veracruz - Sucursales': ['CENTRO','GOLFO','SUR','TEJERIA','ACEROFERTAS'],
  'Veracruz - Almacén General': ['MATRIZ'],
  'Cardel': ['CARDEL'],
  'Xalapa': ['XALAPA'],
  'Acayucan': ['ACAYUCAN'],
  'Minatitlán': ['MINATITLAN'],
  'Coatzacoalcos': ['COATZACOALCOS','COATZACOALCOS 2'],
  'Cosamaloapan': ['COSAMALOAPAN'],
  'Córdoba': ['CORDOBA 1','CORDOBA 2'],
  'Orizaba': ['ORIZABA 1','ORIZABA 2'],
  'San Andrés Tuxtla': ['SAN ANDRES TUXTLA 1','SAN ANDRES TUXTLA 2'],
  'Tierra Blanca': ['TIERRA BLANCA'],
  'Poza Rica': ['POZA RICA'],
  'Comalcalco': ['COMALCALCO'],
  'Cárdenas': ['CARDENAS'],
  'Villahermosa': ['VILLAHERMOSA 1','VILLAHERMOSA 2'],
  'Tuxtla Gutiérrez': ['TUXTLA GTZ CHIAPAS 1','TUXTLA GTZ CHIAPAS 2','TUXTLA GTZ CHIAPAS 3'],
  'Tuxtepec': ['TUXTEPEC 1','TUXTEPEC 2'],
  'Mérida': ['MERIDA 1','MERIDA 2','MERIDA 3','MERIDA 4'],
  'Cancún': ['CANCUN'],
  'Playa del Carmen': ['PLAYA DEL CARMEN'],
  'San Andrés Cholula': ['PUEBLA 2']
};
 
const params = new URLSearchParams(window.location.search);
const id = params.get('id');
const municipio = decodeURIComponent(params.get('municipio') || '');
const candidato = decodeURIComponent(params.get('nombre') || 'Candidato');
const puesto = decodeURIComponent(params.get('puesto') || '');
 
let sucursalSeleccionada = null;
 
function init() {
  document.getElementById('titulo').textContent = municipio || 'Seleccionar sucursal';
  document.getElementById('subtitulo').textContent = puesto || '';
  document.getElementById('info-candidato').innerHTML =
    `Candidato: <strong>${candidato}</strong> &nbsp;·&nbsp; Municipio: <strong>${municipio}</strong>`;
 
  const sucursales = SUCURSALES_POR_MUNICIPIO[municipio] || [];
  const lista = document.getElementById('lista-sucursales');
 
  sucursales.forEach(suc => {
    const btn = document.createElement('button');
    btn.className = 'btn-sucursal';
    btn.textContent = suc;
    btn.onclick = () => seleccionar(btn, suc);
    lista.appendChild(btn);
  });
 
  const urlNo = `${WEBHOOK}?id=${id}&respuesta=NO_HAY_VACANTE`;
  document.getElementById('btn-no').href = urlNo;
}
 
function seleccionar(btn, suc) {
  document.querySelectorAll('.btn-sucursal').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  sucursalSeleccionada = suc;
  document.getElementById('btn-confirm').classList.add('active');
  document.getElementById('error-msg').style.display = 'none';
}
 
async function confirmar() {
  if (!sucursalSeleccionada) {
    document.getElementById('error-msg').style.display = 'block';
    return;
  }
  const url = `${WEBHOOK}?id=${id}&respuesta=HAY_VACANTE&sucursal=${encodeURIComponent(sucursalSeleccionada)}`;
  try {
    await fetch(url);
    document.getElementById('contenido-principal').style.display = 'none';
    const ok = document.getElementById('estado-ok');
    ok.style.display = 'flex';
    document.getElementById('ok-titulo').textContent = 'Vacante confirmada — ' + sucursalSeleccionada;
    document.getElementById('ok-subtitulo').textContent = `El candidato ${candidato} será procesado para ${sucursalSeleccionada}.`;
  } catch(e) {
    document.getElementById('error-msg').textContent = 'Error al confirmar. Intenta de nuevo.';
    document.getElementById('error-msg').style.display = 'block';
  }
}
 
init();
</script>
</body>
</html>
